name: Deploy Laravel Vite React

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      # MODIFIKASI: Gabungkan langkah SSH agar lebih cepat dan kurangi resiko timeout koneksi berulang
      - name: Deploy and Sync Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Gunakan timeout yang lebih lama jika koneksi internet VPS agak lambat
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Pastikan direktori aman bagi Git
            git config --global --add safe.directory /var/www/POS-Harumnya

            # Ambil update terbaru
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies (Lakukan di sini agar vendor folder tetap sinkron)
            composer install --no-dev --optimize-autoloader

      - name: Upload Build Folder (Vite)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build"
          target: "/var/www/POS-Harumnya"
          overwrite: true

      - name: Finalize & Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Optimasi Laravel
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # FIX PERMISSION: Gunakan sudo agar tidak gagal saat mengubah milik www-data
            # Berikan akses ke group agar user SSH dan web server sama-sama bisa baca/tulis
            sudo chown -R $USER:www-data .
            sudo chmod -R 775 storage bootstrap/cache public/build

            # Restart Services (Pastikan versi PHP sesuai dengan yang terinstall di VPS)
            sudo systemctl restart php8.4-fpm
            sudo systemctl reload nginx

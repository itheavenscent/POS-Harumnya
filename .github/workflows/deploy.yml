name: Deploy Laravel POS to VPS

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build Assets (Vite)
        run: |
          npm ci
          npm run build

      # Langkah 1: Sync Code & PHP Dependencies
      - name: Deploy and Sync Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            # Folder domain utama sesuai setup Nginx terbaru
            cd /var/www/harumnya.cloud

            # Ambil alih kepemilikan agar git bisa update tanpa kendala permission
            sudo chown -R ${{ secrets.USERNAME }}:${{ secrets.USERNAME }} .
            git config --global --add safe.directory /var/www/harumnya.cloud

            # Ambil update terbaru dari GitHub
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies backend PHP 8.4
            composer install --no-dev --no-interaction --optimize-autoloader

      # Langkah 2: Upload hasil build Vite (public/build)
      - name: Upload Build Folder (Vite)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "public/build"
          target: "/var/www/harumnya.cloud"
          overwrite: true

      # Langkah 3: Finalisasi & Permissions (Tanpa Migrate)
      - name: Finalize & Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/harumnya.cloud

            # Optimasi Cache Laravel agar aplikasi lebih cepat
            php artisan optimize
            php artisan view:cache

            # Setel ulang permission agar Nginx (www-data) bisa menulis log/cache
            sudo chown -R ${{ secrets.USERNAME }}:www-data .
            sudo chmod -R 775 storage bootstrap/cache public/build

            # Reload PHP 8.4 FPM untuk menerapkan perubahan kode
            sudo systemctl reload php8.4-fpm

name: Deploy Laravel POS to VPS (Docker)

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create project directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            mkdir -p /var/www/harumnya.cloud

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/var/www/harumnya.cloud"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/harumnya.cloud

            # Login to GHCR on the VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Setup .env if it doesn't exist (using secrets)
            if [ ! -f .env ]; then
              echo "APP_NAME=Harumnya" > .env
              echo "APP_ENV=production" >> .env
              echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
              echo "APP_URL=https://harumnya.cloud" >> .env
              echo "DB_CONNECTION=pgsql" >> .env
              echo "DB_HOST=db" >> .env
              echo "DB_PORT=5432" >> .env
              echo "DB_DATABASE=point_of_sales" >> .env
              echo "DB_USERNAME=postgres" >> .env
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            fi

            # Pull latest images
            IMAGE_NAME=ghcr.io/${{ github.repository }} docker compose pull

            # Zero Downtime Deploy
            IMAGE_NAME=ghcr.io/${{ github.repository }} docker compose up -d --remove-orphans

            # Run migrations
            docker compose exec -T app php artisan migrate --force

            # Optimize Laravel
            docker compose exec -T app php artisan optimize
            docker compose exec -T app php artisan view:cache

            # Clean up old images
            docker image prune -f

name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /var/www/POS-Harumnya

            # Pull kode terbaru (untuk update docker-compose.yml dll)
            git pull origin main

            # Login ke GHCR di VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull image terbaru
            docker pull ghcr.io/${{ github.repository }}:latest

            # Ekstrak static assets dari image ke host (agar dibaca oleh nginx)
            docker run --rm -v $(pwd)/public:/host-public ghcr.io/${{ github.repository }}:latest sh -c "rm -rf /host-public/build && cp -r /var/www/public/build /host-public/"

            # Buat direktori yang dibutuhkan
            mkdir -p logs/nginx logs/nginx-proxy storage bootstrap/cache
            mkdir -p storage/app/public storage/framework/cache/data \
                     storage/framework/sessions storage/framework/views \
                     storage/logs

            # Pastikan .env ada
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found!" && exit 1
            fi

            # Hapus container lama dan naikan semua service
            docker compose down --remove-orphans
            docker compose up -d

            # Tunggu DB siap
            echo "Waiting for database..."
            sleep 15

            # Setup Laravel
            docker compose exec -T app php artisan key:generate --force
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link --force
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan optimize
            docker compose exec -T app chown -R www-data:www-data \
              /var/www/storage /var/www/bootstrap/cache

            echo "Deploy selesai!"
            docker compose ps
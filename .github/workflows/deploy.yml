name: Deploy Laravel Vite React

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      # Langkah 1: Update Source Code & Dependencies via SSH
      - name: Deploy and Sync Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true # Membantu melihat log jika koneksi terputus
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Pastikan direktori aman bagi Git
            git config --global --add safe.directory /var/www/POS-Harumnya

            # Ambil update terbaru dari branch main
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies PHP
            composer install --no-dev --optimize-autoloader

      # Langkah 2: Upload hasil build Vite (folder public/build)
      - name: Upload Build Folder (Vite)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          source: "public/build"
          target: "/var/www/POS-Harumnya"
          overwrite: true

      # Langkah 3: Optimasi Laravel & Reset Permissions
      - name: Finalize & Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Optimasi Laravel Cache
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Jalankan migrasi database (opsional, hapus jika tidak perlu otomatis)
            # php artisan migrate --force

            # Perbaikan Permission (Menggunakan sudo NOPASSWD)
            sudo chown -R ${{ secrets.SSH_USERNAME }}:www-data .
            sudo chmod -R 775 storage bootstrap/cache public/build

            # Restart Service (Sesuaikan versi PHP Anda, misal 8.4)
            sudo systemctl restart php8.4-fpm
            sudo systemctl reload nginx

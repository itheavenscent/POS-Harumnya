name: Deploy Laravel Vite React

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      # Langkah 1: Update Source Code & Dependencies via SSH
      - name: Deploy and Sync Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # --- PERBAIKAN UTAMA ---
            # Ambil alih kepemilikan ke user SSH agar Git bisa melakukan reset/overwrite
            sudo chown -R ${{ secrets.SSH_USERNAME }}:${{ secrets.SSH_USERNAME }} .

            # Pastikan direktori aman bagi Git
            git config --global --add safe.directory /var/www/POS-Harumnya

            # Ambil update terbaru
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies PHP (Gunakan --no-interaction agar tidak stuck)
            composer install --no-dev --no-interaction --optimize-autoloader

      # Langkah 2: Upload hasil build Vite (folder public/build)
      - name: Upload Build Folder (Vite)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "public/build"
          target: "/var/www/POS-Harumnya"
          overwrite: true

      # Langkah 3: Optimasi Laravel & Reset Permissions
      - name: Finalize & Permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Jalankan migrasi jika ada perubahan database
            php artisan migrate --force

            # Optimasi Laravel Cache (Satu perintah 'optimize' mencakup config, route, dan file)
            php artisan optimize
            php artisan view:cache

            # Setel ulang permission agar web server (www-data) bisa menulis ke folder storage
            # Kita set folder ke www-data, tapi user SSH tetap punya akses (775)
            sudo chown -R ${{ secrets.SSH_USERNAME }}:www-data .
            sudo chmod -R 775 storage bootstrap/cache public/build

            # Restart PHP-FPM agar cache opcode bersih (Sesuaikan versi PHP Anda)
            # Menggunakan reload lebih aman daripada restart untuk zero-downtime
            sudo systemctl reload php8.4-fpm

version: '3.8'

networks:
  proxy-net:
    external: false

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgre}
      POSTGRES_DB: ${DB_DATABASE:-harumnya}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - proxy-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-harumnya}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - proxy-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: harumnya-app:latest
    container_name: laravel_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www
      - /var/www/vendor # Exclude vendor from bind mount (use image copy)
      - /var/www/node_modules # Exclude node_modules if any
    networks:
      - proxy-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - html:/usr/share/nginx/html # Shared with nginx-proxy for ACME challenge
      - ./logs/nginx:/var/log/nginx # nginx access/error logs on host
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: harumnya.cloud
      LETSENCRYPT_HOST: harumnya.cloud
      VIRTUAL_PORT: 80
    networks:
      - proxy-net
    depends_on:
      - app
      - nginx-proxy # Must start AFTER nginx-proxy is up
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d # Named volume — avoids root-owned dir issue
      - html:/usr/share/nginx/html # Shared with acme-companion for challenge files
      - dhparam:/etc/nginx/dhparam
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./logs/nginx-proxy:/var/log/nginx # Proxy-level access/error logs
    networks:
      - proxy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    environment:
      DEFAULT_EMAIL: andykasalom@gmail.com
      NGINX_PROXY_CONTAINER: nginx-proxy
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d # Write vhost configs for SSL
      - html:/usr/share/nginx/html # Write ACME challenge tokens here
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
  conf:
  html:
  dhparam:
  certs:
  acme:
  vhost: # Named volume instead of bind mount — fixes permission issue for acme-companion

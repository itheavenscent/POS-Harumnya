services:
  # PHP Application
  app:
    image: ${IMAGE_NAME:-pos-harumnya-app:latest}
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: production
    working_dir: /var/www
    volumes:
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./.docker/php/zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    networks:
      - proxy-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php", "-v" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Nginx Web Server (Laravel)
  web:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: harumnya.cloud
      LETSENCRYPT_HOST: harumnya.cloud
      VIRTUAL_PORT: 80
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app_storage:/var/www/storage:ro
    networks:
      - proxy-net
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 80 || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Laravel Queue Worker
  worker:
    image: ${IMAGE_NAME:-pos-harumnya-app:latest}
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    working_dir: /var/www
    volumes:
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - app_storage:/var/www/storage
    networks:
      - proxy-net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Database (PostgreSQL 17)
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - harumnya_db_data:/var/lib/postgresql/data
    networks:
      - proxy-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - proxy-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Database Backup (PostgreSQL)
  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - harumnya_backups:/backups
    networks:
      - proxy-net
    depends_on:
      db:
        condition: service_healthy

  # Nginx Proxy
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost.d:/etc/nginx/vhost.d:ro
      - html:/usr/share/nginx/html
      - dhparam:/etc/nginx/dhparam
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - proxy-net

  # ACME Companion (SSL)
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: always
    environment:
      DEFAULT_EMAIL: andykasalom@gmail.com
      NGINX_PROXY_CONTAINER: nginx-proxy
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost.d:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - proxy-net

networks:
  proxy-net:
    external: false

volumes:
  harumnya_db_data:
  harumnya_backups:
  app_storage:
  app_bootstrap_cache:
  conf:
  html:
  dhparam:
  certs:
  acme:
  vhost.d:

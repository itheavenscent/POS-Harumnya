services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-pos-harumnya-app:latest}

    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./.docker/php/zz-docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
    networks:
      - harumnya-network
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "php", "artisan", "help"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M

  # Nginx Web Server
  web:
    image: nginx:alpine

    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - harumnya-network
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # Laravel Queue Worker
  worker:
    image: ${IMAGE_NAME:-pos-harumnya-app:latest}

    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - harumnya-network
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Database (PostgreSQL 17)
  db:
    image: postgres:17-alpine

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - harumnya_db_data:/var/lib/postgresql/data
    networks:
      - harumnya-network
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  # Redis
  redis:
    image: redis:alpine

    restart: unless-stopped
    networks:
      - harumnya-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # Database Backup (PostgreSQL)
  db-backup:
    image: prodrigestivill/postgres-backup-local

    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Backup daily at 00:00
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - harumnya_backups:/backups
    networks:
      - harumnya-network
    depends_on:
      - db

networks:
  harumnya-network:
    driver: bridge
  proxy:
    external: true

volumes:
  harumnya_db_data:
  harumnya_letsencrypt:
  harumnya_backups:
